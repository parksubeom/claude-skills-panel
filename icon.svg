<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" shape-rendering="crispEdges">
  <!-- Frame outer -->
  <rect x="8" y="8" width="112" height="112" rx="14" fill="#1a1f2c" stroke="#5a6273" stroke-width="4"/>
  <rect x="12" y="12" width="104" height="104" rx="10" fill="#252b3a"/>
  <!-- Diagonal accent line in background (subtle CRT/grid hint) -->
  <g opacity="0.15" fill="#5a6273">
    <rect x="20" y="20" width="4" height="4"/>
    <rect x="40" y="20" width="4" height="4"/>
    <rect x="60" y="20" width="4" height="4"/>
    <rect x="80" y="20" width="4" height="4"/>
    <rect x="100" y="20" width="4" height="4"/>
    <rect x="20" y="100" width="4" height="4"/>
    <rect x="40" y="100" width="4" height="4"/>
    <rect x="60" y="100" width="4" height="4"/>
    <rect x="80" y="100" width="4" height="4"/>
    <rect x="100" y="100" width="4" height="4"/>
    <rect x="20" y="60" width="4" height="4"/>
    <rect x="100" y="60" width="4" height="4"/>
  </g>
  <!-- 8-point Claude spark, centered (orange) -->
  <g fill="#d97757">
    <!-- Vertical bar -->
    <rect x="60" y="28" width="8" height="32"/>
    <rect x="60" y="68" width="8" height="32"/>
    <!-- Horizontal bar -->
    <rect x="28" y="60" width="32" height="8"/>
    <rect x="68" y="60" width="32" height="8"/>
    <!-- Diagonal arms (top-left, top-right, bot-left, bot-right) -->
    <rect x="40" y="40" width="8" height="8"/>
    <rect x="80" y="40" width="8" height="8"/>
    <rect x="40" y="80" width="8" height="8"/>
    <rect x="80" y="80" width="8" height="8"/>
    <rect x="44" y="44" width="8" height="8"/>
    <rect x="76" y="44" width="8" height="8"/>
    <rect x="44" y="76" width="8" height="8"/>
    <rect x="76" y="76" width="8" height="8"/>
  </g>
  <!-- Inner accent (lighter orange ring around center) -->
  <g fill="#f4a584">
    <rect x="56" y="56" width="16" height="16"/>
  </g>
  <!-- White center pixel -->
  <rect x="60" y="60" width="8" height="8" fill="#ffffff"/>
  <!-- Tiny side sparkles -->
  <g fill="#fbbf24">
    <rect x="100" y="32" width="4" height="4"/>
    <rect x="96" y="36" width="4" height="4"/>
    <rect x="104" y="36" width="4" height="4"/>
    <rect x="100" y="40" width="4" height="4"/>
    <rect x="24" y="88" width="4" height="4"/>
    <rect x="20" y="92" width="4" height="4"/>
    <rect x="28" y="92" width="4" height="4"/>
    <rect x="24" y="96" width="4" height="4"/>
  </g>
</svg>
