name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Verify (syntax + i18n parity)
        run: npm run verify
      - name: Build assets
        run: |
          npm run build:pixels
          npm run build:spark
          npm run build:buddy
      - name: Dry-run package
        run: npx --yes @vscode/vsce package --no-dependencies
