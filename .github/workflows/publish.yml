name: Publish Extension

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.23.0). Defaults to package.json version.'
        required: false

jobs:
  build:
    name: Build .vsix
    runs-on: ubuntu-latest
    outputs:
      vsix: ${{ steps.pack.outputs.vsix }}
      version: ${{ steps.pack.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build pixel/spark/buddy assets
        run: |
          npm run build:pixels
          npm run build:spark
          npm run build:buddy
      - name: Package .vsix
        id: pack
        run: |
          npx --yes @vscode/vsce package --no-dependencies
          VSIX=$(ls -1 *.vsix | head -n1)
          VERSION=$(node -p "require('./package.json').version")
          echo "vsix=$VSIX" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Built $VSIX (version $VERSION)"
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: '*.vsix'
          if-no-files-found: error

  publish-ovsx:
    name: Publish to OpenVSX
    needs: build
    runs-on: ubuntu-latest
    if: ${{ vars.SKIP_OVSX != 'true' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix
      - name: Publish
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "::error::OVSX_PAT secret is not set. Add it under Settings → Secrets → Actions."
            exit 1
          fi
          npx --yes ovsx publish "${{ needs.build.outputs.vsix }}" -p "$OVSX_PAT"

  publish-vsce:
    name: Publish to VS Code Marketplace
    needs: build
    runs-on: ubuntu-latest
    if: ${{ vars.SKIP_VSCE != 'true' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix
      - name: Publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::warning::VSCE_PAT secret is not set — skipping VS Code Marketplace publish."
            exit 0
          fi
          npx --yes @vscode/vsce publish --packagePath "${{ needs.build.outputs.vsix }}" -p "$VSCE_PAT"

  release:
    name: Attach .vsix to GitHub Release
    needs: [build, publish-ovsx, publish-vsce]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix
      - name: Create / update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" *.vsix --clobber
          else
            gh release create "$TAG" *.vsix \
              --title "$TAG" \
              --notes "Published to OpenVSX and VS Code Marketplace. See README for install links."
          fi
